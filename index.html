<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" href="./pages/index.css">
    <title>Место</title>
  </head>
  <body class="page">
    <header class="header">
      <img
        class="header__logo"
        src="./images/logo.svg"
        alt="Логотип Mesto Russia"
      >
    </header>
    <main class="content">
      <section class="profile">
        <img
          class="profile__avatar"
          src="./images/avatar.jpg"
          alt="Аватар пользователя Жак-Ив Кусто"
        >
        <div class="profile__info">
          <div class="profile__name-wrapper">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button
              class="profile__edit-button"
              type="button"
              aria-label="Редактировать профиль"
            ></button>
          </div>
          <p class="profile__description">Исследователь океана</p>
        </div>
        <button
          class="profile__add-button"
          type="button"
          aria-label="Добавить фотографию"
        ></button>
      </section>
      <section class="elements" aria-label="Фотогалерея">
        <ul class="elements__list"></ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">
        &copy; <span class="footer__year"></span> Mesto Russia
      </p>
    </footer>
    <div class="popup popup_type_edit">
      <div class="popup__container">
        <button
          class="popup__close"
          type="button"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form" name="edit-profile" novalidate>
          <input
            class="popup__input popup__input_type_name"
            type="text"
            name="name"
            placeholder="Имя"
            minlength="2"
            maxlength="40"
            required
            autocomplete="off"
          >
          <input
            class="popup__input popup__input_type_about"
            type="text"
            name="about"
            placeholder="О себе"
            minlength="2"
            maxlength="200"
            required
            autocomplete="off"
          >
          <button class="popup__submit" type="submit">Сохранить</button>
        </form>
      </div>
    </div>
    <div class="popup popup_type_new-card">
      <div class="popup__container">
        <button
          class="popup__close"
          type="button"
          aria-label="Закрыть"
        ></button>
        <h2 class="popup__title">Новое место</h2>
        <form class="popup__form" name="add-card" novalidate>
          <input
            class="popup__input popup__input_type_card-name"
            type="text"
            name="name"
            placeholder="Название"
            minlength="2"
            maxlength="30"
            required
            autocomplete="off"
          >
          <input
            class="popup__input popup__input_type_card-link"
            type="url"
            name="link"
            placeholder="Ссылка на картинку"
            required
            autocomplete="off"
          >
          <button class="popup__submit" type="submit">Создать</button>
        </form>
      </div>
    </div>
    <div class="popup popup_type_image">
      <div class="popup__image-container">
        <button
          class="popup__close"
          type="button"
          aria-label="Закрыть"
        ></button>
        <img
          class="popup__image"
          src="./images/arkhyz.jpg"
          alt="Фотография места"
        >
        <p class="popup__caption"></p>
      </div>
    </div>
    <template id="card-template">
      <li class="element">
        <button
          class="element__delete-button"
          type="button"
          aria-label="Удалить карточку"
        ></button>
        <img class="element__image" src="" alt="">
        <div class="element__info">
          <h2 class="element__title"></h2>
          <button
            class="element__like-button"
            type="button"
            aria-label="Поставить лайк"
          ></button>
        </div>
      </li>
    </template>
    <script src="./js/index.js"></script>
  </body>
</html>
