<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" href="./pages/index.css">
    <title>Место</title>
  </head>
  <body class="page">
    <header class="header">
      <img
        class="header__logo"
        src="./images/logo.svg"
        alt="Логотип Mesto Russia"
      >
    </header>
    <main class="content">
      <section class="profile">
        <img
          class="profile__avatar"
          src="./images/avatar.jpg"
          alt="Аватар пользователя Жак-Ив Кусто"
        >
        <div class="profile__info">
          <div class="profile__name-wrapper">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button
              class="profile__edit-button"
              type="button"
              aria-label="Редактировать профиль"
            ></button>
          </div>
          <p class="profile__description">Исследователь океана</p>
        </div>
        <button
          class="profile__add-button"
          type="button"
          aria-label="Добавить фотографию"
        ></button>
      </section>
      <section class="elements">
        <ul class="elements__list">
          <li class="element">
            <img class="element__image" src="./images/arkhyz.jpg" alt="Архыз">
            <div class="element__info">
              <h2 class="element__title">Архыз</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
          <li class="element">
            <img
              class="element__image"
              src="./images/chelyabinsk-oblast.jpg"
              alt="Челябинская область"
            >
            <div class="element__info">
              <h2 class="element__title">Челябинская область</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
          <li class="element">
            <img
              class="element__image"
              src="./images/ivanovo.jpg"
              alt="Иваново"
            >
            <div class="element__info">
              <h2 class="element__title">Иваново</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
          <li class="element">
            <img
              class="element__image"
              src="./images/kamchatka.jpg"
              alt="Камчатка"
            >
            <div class="element__info">
              <h2 class="element__title">Камчатка</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
          <li class="element">
            <img
              class="element__image"
              src="./images/kholmogorsky-rayon.jpg"
              alt="Холмогорский район"
            >
            <div class="element__info">
              <h2 class="element__title">Холмогорский район</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
          <li class="element">
            <img
              class="element__image"
              src="./images/baikal.jpg"
              alt="Байкал"
            >
            <div class="element__info">
              <h2 class="element__title">Байкал</h2>
              <button
                class="element__like-button"
                type="button"
                aria-label="Поставить лайк"
              ></button>
            </div>
          </li>
        </ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__copyright">
        &copy; <span class="footer__year"></span> Mesto Russia
      </p>
    </footer>
    <script src="./js/index.js"></script>
  </body>
</html>
